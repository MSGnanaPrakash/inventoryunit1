<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Machine Usage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('/static/cotton_background.jpg');
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
        }
        
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            max-width: 600px;
            margin: 60px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }
        
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
        
        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }
        
        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #216a94;
        }
        
        .back-btn {
            margin-top: 15px;
            background-color: #27ae60;
        }
        
        .back-btn:hover {
            background-color: #1f8c4c;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Machine Usage Entry</h2>
        <form method="POST">
            <label for="order_id">Order/Batch ID</label>
            <input type="text" name="order_id" required>

            <label for="machine_id">Machine</label>
            <select name="machine_id" required>
                <option value="">Select Machine</option>
                {% for machine in machines %}
                    <option value="{{ machine.id }}">{{ machine.machine_name }} ({{ machine.capacity }} kg)</option>

                {% endfor %}
            </select>

            <label for="color">Colour</label>
            <input type="text" name="color" placeholder="e.g., Black" required>

            <label for="quantity">Quantity Used (kg)</label>
            <input type="number" name="quantity" min="0" step="any" required>

            <label for="date">Date</label>
            <input type="date" name="date" required>

            <button type="submit">Submit Usage</button>
        </form>

        <form action="{{ url_for('dashboard') }}">
            <button type="submit" class="back-btn">Back to Home</button>
        </form>
    </div>
</body>

</html>
