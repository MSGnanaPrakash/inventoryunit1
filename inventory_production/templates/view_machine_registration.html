<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>View Machines</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('/static/image/cotton_background.jpg');
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
        }
        
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            max-width: 800px;
            margin: 60px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        
        h2 {
            text-align: center;
            color: #333;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }
        
        th,
        td {
            padding: 12px;
            text-align: left;
            border: 1px solid #ccc;
        }
        
        th {
            background-color: #2980b9;
            color: white;
        }
        
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .edit {
            background-color: #f39c12;
            color: white;
        }
        
        .delete {
            background-color: #e74c3c;
            color: white;
        }
        
        .back-btn {
            margin-top: 20px;
            background-color: #27ae60;
            color: white;
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .back-btn:hover {
            background-color: #1f8c4c;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Registered Machines</h2>

        <!-- Add Machine Button -->
        <form action="{{ url_for('add_machine') }}">
            <button type="submit" class="back-btn" style="background-color: #2980b9; margin-bottom: 20px;">Add Machine</button>
        </form>

        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Capacity (kg)</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            {% for machine in machines %}
            <tr>
                <td>{{ machine.id }}</td>
                <td>{{ machine.machine_name }}</td>
                <td>{{ machine.capacity }}</td>
                <td>{{ machine.status }}</td>
                <td>
                    <a href="{{ url_for('edit_machine', id=machine.id) }}" class="btn edit">Edit</a>
                    <a href="{{ url_for('delete_machine', id=machine.id) }}" class="btn delete" onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>

        <form action="{{ url_for('dashboard') }}">
            <button class="back-btn" type="submit">Back to Home</button>
        </form>
    </div>

</body>

</html>
